name: "SAST, Build, Scan, Update all-in-one.yaml & version.txt"

on:
  push:
    branches:
      - main

env:
  VERSION: $(( $(cat version.txt) + 1 ))

jobs:

# =============================
# 1️⃣ SONARQUBE SAST
# =============================

  sonarqube_sast_scan:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarQube Scan Backend
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: SOP_Backend
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan Frontend
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: SOP_FrontEnd
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# =============================
# 2️⃣ BUILD & PUSH IMAGES
# =============================

  build_push_images:
    runs-on: ubuntu-latest
    needs: sonarqube_sast_scan

    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t sonamsc507/sop-backend-final:${{ env.VERSION }} ./SOP_Backend
          docker push sonamsc507/sop-backend-final:${{ env.VERSION }}

      - name: Build & Push Frontend
        run: |
          docker build -t sonamsc507/sop-frontend-final:${{ env.VERSION }} ./SOP_FrontEnd
          docker push sonamsc507/sop-frontend-final:${{ env.VERSION }}

# =============================
# 3️⃣ TRIVY IMAGE SCAN
# =============================

  image_scan:
    runs-on: self-hosted
    needs: build_push_images

    steps:
      - uses: actions/checkout@v3

      - name: Pull Images
        run: |
          docker pull sonamsc507/sop-backend-final:${{ env.VERSION }}
          docker pull sonamsc507/sop-frontend-final:${{ env.VERSION }}

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sonamsc507/sop-backend-final:${{ env.VERSION }}
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sonamsc507/sop-frontend-final:${{ env.VERSION }}
          severity: CRITICAL,HIGH
          exit-code: '0'

# =============================
# 4️⃣ UPDATE all-in-one.yaml
# =============================

  update_k8s_yaml:
    runs-on: ubuntu-latest
    needs: image_scan

    steps:
      - uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Update Image Tags & Version
        run: |
          git pull

          sed -i "s|image: sonamsc507/sop-backend-final:.*|image: sonamsc507/sop-backend-final:${{ env.VERSION }}|" all-in-one.yaml
          sed -i "s|image: sonamsc507/sop-frontend-final:.*|image: sonamsc507/sop-frontend-final:${{ env.VERSION }}|" all-in-one.yaml

          echo ${{ env.VERSION }} > version.txt

          git add all-in-one.yaml version.txt
          git commit -m "Updated images to version ${{ env.VERSION }}"
          git push

