# =========================
# Secret for MariaDB password
# =========================
apiVersion: v1
kind: Secret
metadata:
  name: sop-db-secret
  namespace: sop
type: Opaque
data:
  # Replace this with your base64-encoded password
  DB_PASS: cGFzc3dvcmQxMjM=  # Example: echo -n "password123" | base64

---
# =========================
# ConfigMap for DB connection info
# =========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: sop-db-config
  namespace: sop
data:
  DB_HOST: "10.70.91.8"
  DB_PORT: "3306"
  DB_USER: "root"
  DB_NAME: "sop_db"

---
# =========================
# Backend Deployment + ClusterIP Service
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sop-backend
  namespace: sop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sop-backend
  template:
    metadata:
      labels:
        app: sop-backend
    spec:
      containers:
        - name: sop-backend
          image: sonamsc507/sop-backend-final:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8093
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sop-db-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sop-db-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: sop-db-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sop-db-config
                  key: DB_NAME
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: sop-db-secret
                  key: DB_PASS
---
apiVersion: v1
kind: Service
metadata:
  name: sop-backend-service
  namespace: sop
spec:
  type: ClusterIP
  selector:
    app: sop-backend
  ports:
    - port: 8093
      targetPort: 8093

---
# =========================
# Frontend Deployment + NodePort Service
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sop-frontend
  namespace: sop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sop-frontend
  template:
    metadata:
      labels:
        app: sop-frontend
    spec:
      containers:
        - name: sop-frontend
          image: sonamsc507/sop-frontend-final:node
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: sop-frontend-service
  namespace: sop
spec:
  type: NodePort
  selector:
    app: sop-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080